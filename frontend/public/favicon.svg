<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 210 110">
  <defs>
    <!-- Punch out the two inner holes -->
    <clipPath id="holes">
      <path fill-rule="evenodd" d="
        M-5,-5 H205 V105 H-5 Z
        M 41,50 a22,22 0 1,0 44,0 a22,22 0 1,0 -44,0
        M 115,50 a22,22 0 1,0 44,0 a22,22 0 1,0 -44,0
      "/>
    </clipPath>
  </defs>

  <!-- 1. Fat black outer stroke (creates outer + inner contour) -->
  <path clip-path="url(#holes)"
    d="M100,50 C100,8 182,8 182,50 C182,92 100,92 100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="black" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 2. White fill (narrower, sits inside the black) -->
  <path clip-path="url(#holes)"
    d="M100,50 C100,8 182,8 182,50 C182,92 100,92 100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="white" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3. Thin black inner outline -->
  <path clip-path="url(#holes)"
    d="M100,50 C100,8 182,8 182,50 C182,92 100,92 100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4. Redraw the left loop's crossing portion on top to create the weave -->
  <clipPath id="right-of-center">
    <rect x="85" y="-5" width="120" height="110"/>
  </clipPath>
  <path clip-path="url(#right-of-center)"
    d="M100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="black" stroke-width="54" stroke-linecap="round"/>
  <path clip-path="url(#right-of-center)"
    d="M100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="white" stroke-width="42" stroke-linecap="round"/>
  <path clip-path="url(#right-of-center)"
    d="M100,50 C100,92 18,92 18,50 C18,8 100,8 100,50"
    fill="none" stroke="black" stroke-width="4" stroke-linecap="round"/>
</svg>
